limit_req_zone $binary_remote_addr zone=agartha_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=agartha_auth:10m rate=2r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location = /api {
        return 308 /api/;
    }

    location /api/auth/ {
        limit_req zone=agartha_auth burst=10 nodelay;
        proxy_pass http://api:8000/auth/;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /api/ {
        limit_req zone=agartha_api burst=30 nodelay;
        proxy_pass http://api:8000/;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
