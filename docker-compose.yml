services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: agartha-api:latest
    env_file:
      - .env
    environment:
      AGARTHA_AUDIT_LOG_PATH: /app/logs/audit.log
    volumes:
      - agartha_data:/app/.tmp
      - agartha_logs:/app/logs
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - internal

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: agartha-pipeline:latest
    env_file:
      - .env
    volumes:
      - agartha_data:/app/.tmp
      - agartha_logs:/app/logs
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    image: agartha-frontend:latest
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - agartha_logs:/var/log/nginx
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - internal
      - public

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  agartha_data:
  agartha_logs:
  certbot_www:
  certbot_conf:

networks:
  internal:
    internal: true
  public:
